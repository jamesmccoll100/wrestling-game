<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wrestling Arena</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #terminal {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .xterm {
    margin: 0 auto;
  }
</style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script>
    const term = new Terminal({
      cols: 91,
      rows: 30,
      cursorBlink: true,
      theme: { background: '#000000', foreground: '#ffffff' }
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    const socket = io({ transports: ['websocket'] });

    socket.on('connect', () => {
      term.write('\r\nConnected. Loading game...\r\n');
    });
    socket.on('output', data => term.write(data));
    socket.on('game_ended', () => {
      term.write('\r\n\r\n[ Game session ended. Refresh to play again. ]\r\n');
    });
    socket.on('disconnect', () => {
      term.write('\r\n\r\n[ Disconnected from server. ]\r\n');
    });

    term.onKey(({ key }) => socket.emit('input', key));
  </script>
</body>
</html>
