<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
  <meta charset="utf-8">
  <title>Wrestling Arena</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000000;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #terminal {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .xterm { margin: 0 auto; }
    .xterm-viewport,
    .xterm-screen,
    .xterm-rows,
    .xterm canvas {
      background: #000000 !important;
      background-color: #000000 !important;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script>
    const term = new Terminal({
  cols: 90,
  rows: 30,
  cursorBlink: true,
  allowTransparency: false,
  fontFamily: 'Courier Prime, Courier New, monospace',
  fontSize: 14,
  lineHeight: 1.0,
  theme: {
    background: '#000000',
    foreground: '#ffffff',
    black: '#000000',
    brightBlack: '#000000',
    cursor: '#ffffff',
    selectionBackground: '#ffffff'
  }
});
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    // Force black background on the canvas element directly
    const canvas = document.querySelector('.xterm-screen canvas');
    if (canvas) canvas.style.background = '#000000';

    const socket = io({ transports: ['websocket'] });

    socket.on('connect', () => {
      term.write('\r\nConnected. Loading game...\r\n');
    });
    socket.on('output', data => term.write(data));
    socket.on('game_ended', () => {
      term.write('\r\n\r\n[ Game session ended. Refresh to play again. ]\r\n');
    });
    socket.on('disconnect', () => {
      term.write('\r\n\r\n[ Disconnected from server. ]\r\n');
    });

    term.onKey(({ key }) => socket.emit('input', key));
  </script>
<!-- Background music -->
  <audio id="bgmusic" loop preload="auto">
    <source src="https://res.cloudinary.com/dwyqyl1je/video/upload/v1776798392/WrestlingArenaMusic_yb1spa.wav" type="audio/wav">
  </audio>

  <script>
    // Start music on first user interaction (browser requirement)
    const music = document.getElementById('bgmusic');
    music.volume = 0.4;

    function startMusic() {
      music.play().catch(() => {});
      document.removeEventListener('click', startMusic);
      document.removeEventListener('keydown', startMusic);
    }

    document.addEventListener('click', startMusic);
    document.addEventListener('keydown', startMusic);
  </script>
</body>
</html>
