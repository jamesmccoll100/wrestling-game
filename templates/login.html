<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wrestling Arena — Enter Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: monospace;
    }
    .box {
      text-align: center;
      border: 1px solid #333;
      padding: 50px 60px;
      border-radius: 4px;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #fff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
    input[type="password"] {
      background: #000;
      border: 1px solid #444;
      color: #fff;
      padding: 10px 16px;
      font-family: monospace;
      font-size: 1rem;
      width: 220px;
      text-align: center;
      border-radius: 2px;
      outline: none;
      letter-spacing: 4px;
    }
    input[type="password"]:focus {
      border-color: #fff;
    }
    button {
      display: block;
      margin: 16px auto 0;
      background: #000;
      border: 1px solid #fff;
      color: #fff;
      padding: 10px 32px;
      font-family: monospace;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
    }
    button:hover {
      background: #fff;
      color: #000;
    }
    .error {
      color: #ff4444;
      margin-top: 16px;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Wrestling Arena</h1>
    <p>Enter password to continue</p>
    <form method="POST">
      <input
        type="password"
        name="password"
        placeholder="••••••"
        autofocus
        autocomplete="off">
      <button type="submit">Enter</button>
    </form>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
  </div>
</body>
</html>
